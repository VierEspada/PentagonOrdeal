<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kill Clips</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: sans-serif;
}

/* タイトル */
.title {
  text-align: center;
  color: #00d5ff;
  padding: 20px;
  letter-spacing: 3px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

/* ===== クリップカード ===== */
.clip {
  position: relative;
  display: flex;
  flex-direction: column;
  text-decoration: none;
  border: 1px solid rgba(0, 213, 255, 0.5);
  background: rgba(0, 20, 30, 0.6);
  overflow: hidden;
  transition: 0.3s;

  /* 常に少し光る */
  box-shadow: 0 0 10px rgba(0, 213, 255, 0.3);
}

/* サムネ */
.clip img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

/* 名前 */
.name {
  padding: 10px;
  color: #00d5ff;
  font-weight: bold;
  text-align: center;
  letter-spacing: 2px;
}

/* ===== ホバーで発光 ===== */
.clip:hover {
  transform: scale(1.05);
  background: rgba(0, 213, 255, 0.15);

  box-shadow:
    0 0 20px rgba(0, 213, 255, 0.9),
    0 0 40px rgba(0, 213, 255, 0.6),
    0 0 60px rgba(0, 213, 255, 0.4);

  border: 1px solid #00d5ff;
}

.clip:hover .name {
  color: white;
}

/* ===== 光が流れるエフェクト ===== */
.clip::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(0, 213, 255, 0.4),
    transparent
  );
  transform: rotate(25deg);
  opacity: 0;
}

.clip:hover::before {
  opacity: 1;
  animation: shine 1s linear;
}

@keyframes shine {
  from {
    transform: translateX(-100%) rotate(25deg);
  }
  to {
    transform: translateX(100%) rotate(25deg);
  }
}

/* スマホ */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<h1 class="title">Death Clip</h1>
<a href="page.html" class="back">BACK</a>

  <a href="clip1.html" class="clip">

  </a>

  <a href="clip2.html" class="clip">

  </a>

  </a>

  <a href="clip4.html" class="clip">
    <img src="thumb4.jpg">

  <a href="clip5.html" class="clip">

  </a>

  <a href="clip6.html" class="clip">

</div>

</body>
</html>
